server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all unknown paths -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API to the backend container.
    # Because nginx handles /api in production, the frontend can keep calling
    # "/api/..." exactly like it did with the Vite dev proxy — no code change.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;   # LLM calls can take a few seconds
    }
}
